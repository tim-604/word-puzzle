<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Family Heads Up</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-white: #ffffff;
            --primary: #6366f1;
            --success: #22c55e;
            --danger: #ef4444;
            --text-dark: #1e293b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        /* --- SCREENS --- */
        .screen {
            display: none;
            width: 100%; height: 100%;
            padding: 20px;
            flex-direction: column;
            align-items: center;
        }
        .active { display: flex; }

        /* --- MENU SCREEN --- */
        #menu-screen h1 { font-size: clamp(1.5rem, 5vw, 3rem); margin-bottom: 20px; color: var(--primary); }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1200px;
            overflow-x: hidden; /* Prevents horizontal scroll on hover scaling */
            padding: 15px; /* Room for cards to scale without being clipped */
            padding-bottom: 50px;
        }

        .category-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            padding: 10px;
        }

        .category-card:hover { transform: scale(1.05); background: var(--primary); }
        .cat-icon { font-size: clamp(2rem, 5vw, 3.5rem); margin-bottom: 5px; }
        .cat-name { font-size: clamp(0.8rem, 2vw, 1.1rem); font-weight: bold; text-transform: uppercase; }

        /* --- GAME SCREEN --- */
        #game-screen { justify-content: space-between; padding: 10px; }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1000px;
            padding: 10px;
            font-size: clamp(1.2rem, 4vw, 2.5rem);
            font-weight: 900;
        }

        .close-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            font-size: 2rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            line-height: 0;
            padding-bottom: 4px;
        }
        .close-btn:hover { background: var(--danger); }

        .card {
            background: var(--card-white);
            color: var(--text-dark);
            width: 95%;
            max-width: 1000px;
            flex-grow: 1;
            margin: 15px 0;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            padding: 20px;
            text-align: center;
            overflow: hidden;
        }

        .card-word {
            /* Increased minimum font size and adjusted scaling for better multiline appearance */
            font-size: clamp(3.2rem, 14vw, 7.5rem);
            font-weight: 900;
            line-height: 1.1;
            text-transform: uppercase;
            /* Ensure it breaks at spaces naturally */
            white-space: normal;
            overflow-wrap: break-word;
            word-break: normal;
            max-width: 100%;
        }

        .controls {
            display: flex;
            width: 100%;
            max-width: 1000px;
            gap: 15px;
            height: 15vh;
            min-height: 80px;
            margin-bottom: 10px;
        }

        .btn {
            flex: 1;
            border: none;
            border-radius: 20px;
            color: white;
            font-size: clamp(1.2rem, 3vw, 2rem);
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 8px 0 rgba(0,0,0,0.2);
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 4px 0 rgba(0,0,0,0.2); }

        #btn-skip { background: var(--danger); }
        #btn-got-it { background: var(--success); }

        /* --- RESULTS SCREEN --- */
        #results-screen { justify-content: center; }
        .res-pill { background: var(--primary); padding: 20px 60px; border-radius: 50px; font-size: 4rem; margin: 20px; font-weight: 900; }

        .btn-back {
            background: var(--primary);
            color: white;
            padding: 20px 50px;
            border-radius: 40px;
            font-weight: 800;
            font-size: 1.5rem;
            margin-top: 30px;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 0 rgba(0,0,0,0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-back:active { transform: translateY(4px); box-shadow: 0 4px 0 rgba(0,0,0,0.2); }

        /* --- COUNTDOWN --- */
        #countdown-screen { justify-content: center; }
        #cd-num { font-size: 15rem; font-weight: 900; color: var(--primary); }
    </style>
</head>
<body>

    <div id="menu-screen" class="screen active">
        <h1>HEADS UP</h1>
        <div class="grid" id="category-grid"></div>
    </div>

    <div id="countdown-screen" class="screen">
        <div id="cd-num">3</div>
    </div>

    <div id="game-screen" class="screen">
        <div class="game-header">
            <div id="timer" style="color: var(--danger); width: 80px;">60s</div>
            <div id="cat-name-display" style="color: var(--primary); flex-grow: 1; text-align: center;">ANIMALS</div>
            <div id="score" style="width: 80px; text-align: right;">0</div>
            <button class="close-btn" onclick="game.endGame(true)" style="margin-left: 20px;">×</button>
        </div>
        
        <div class="card">
            <div class="card-word" id="word-display">READY?</div>
        </div>

        <div class="controls">
            <button class="btn" id="btn-skip" onclick="game.handleAction(false)">SKIP (←)</button>
            <button class="btn" id="btn-got-it" onclick="game.handleAction(true)">GOT IT (→)</button>
        </div>
    </div>

    <div id="results-screen" class="screen">
        <h1 style="font-size: 3rem; margin: 0;">FINAL SCORE</h1>
        <div class="res-pill" id="final-score">0</div>
        <button class="btn-back" onclick="game.showScreen('menu-screen')">PLAY AGAIN</button>
    </div>

            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        const game = {
            score: 0,
            timeLeft: 60,
            deck: [],
            timer: null,

            init() {
                const grid = document.getElementById('category-grid');
                Object.keys(categories).forEach(key => {
                    const card = document.createElement('div');
                    card.className = 'category-card';
                    card.innerHTML = `<div class="cat-icon">${categories[key].i}</div><div class="cat-name">${key}</div>`;
                    card.onclick = () => this.startCountdown(key);
                    grid.appendChild(card);
                });
            },

            startCountdown(catName) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                this.deck = [...categories[catName].w].sort(() => Math.random() - 0.5);
                document.getElementById('cat-name-display').innerText = catName;
                this.showScreen('countdown-screen');
                
                let count = 3;
                const cdNum = document.getElementById('cd-num');
                cdNum.innerText = count;
                sfx.tick();
                
                const interval = setInterval(() => {
                    count--;
                    if(count > 0) {
                        cdNum.innerText = count;
                        sfx.tick();
                    } else {
                        clearInterval(interval);
                        this.startGame();
                    }
                }, 1000);
            },

            startGame() {
                this.score = 0;
                this.timeLeft = 60;
                this.showScreen('game-screen');
                this.nextWord();
                this.updateUI();
                
                this.timer = setInterval(() => {
                    this.timeLeft--;
                    document.getElementById('timer').innerText = this.timeLeft + "s";
                    if(this.timeLeft <= 5 && this.timeLeft > 0) sfx.tick();
                    if(this.timeLeft <= 0) this.endGame();
                }, 1000);
            },

            handleAction(correct) {
                if(correct) { this.score++; sfx.correct(); } 
                else { sfx.skip(); }
                this.updateUI();
                this.nextWord();
            },

            nextWord() {
                if(this.deck.length === 0) { this.endGame(); return; }
                document.getElementById('word-display').innerText = this.deck.pop();
            },

            updateUI() {
                document.getElementById('score').innerText = this.score;
            },

            endGame(wasClosed = false) {
                clearInterval(this.timer);
                if (wasClosed) {
                    this.showScreen('menu-screen');
                } else {
                    sfx.end();
                    document.getElementById('final-score').innerText = this.score;
                    this.showScreen('results-screen');
                }
            },

            showScreen(id) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(id).classList.add('active');
            }
        };

        window.addEventListener('keydown', (e) => {
            if(document.getElementById('game-screen').classList.contains('active')) {
                if(e.key === "ArrowRight") game.handleAction(true);
                if(e.key === "ArrowLeft") game.handleAction(false);
                if(e.key === "Escape") game.endGame(true);
            }
        });

        game.init();
    </script>
